<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glub AI | Cloud Brain</title>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #38bdf8;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #glub-container {
            width: 90%;
            max-width: 600px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        h1 { text-align: center; font-weight: 300; letter-spacing: 2px; color: var(--accent); }
        
        #chat-box {
            height: 300px;
            overflow-y: auto;
            margin-bottom: 1rem;
            padding: 10px;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .input-group { display: flex; gap: 10px; }

        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        button {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { transform: translateY(-2px); opacity: 0.9; }

        .status { font-size: 0.7rem; color: #94a3b8; margin-top: 10px; text-align: center; }
        
        .bot-msg { color: var(--accent); margin-bottom: 10px; }
        .user-msg { color: #f1f5f9; margin-bottom: 10px; border-left: 2px solid var(--accent); padding-left: 10px; }
    </style>
</head>
<body>

<div id="glub-container">
    <h1>GLUB 🫧</h1>
    <div id="chat-box">
        <div class="bot-msg">Glub is online. Everything is in the cloud. How can I help?</div>
    </div>
    
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Ask Glub something...">
        <button onclick="runGlub()">Ask</button>
    </div>
    <div id="status" class="status">Idle</div>
</div>

<script>
    // --- 🔑 YOUR CLOUD CONFIG ---
    const CONFIG = {
        SB_URL: 'YOUR_SUPABASE_URL',
        SB_KEY: 'YOUR_SUPABASE_ANON_KEY',
        CLAUDE_KEY: 'YOUR_CLAUDE_KEY'
    };

    const supabase = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);

    async function runGlub() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chat-box');
        const status = document.getElementById('status');
        const query = input.value;
        if(!query) return;

        // Update UI
        chatBox.innerHTML += `<div class="user-msg"><b>You:</b> ${query}</div>`;
        input.value = "";
        status.innerText = "🔍 DuckDuckGo is searching...";

        try {
            // 1. ATTEMPT WEB SEARCH (via Puter + DuckDuckGo logic)
            let searchResponse = await puter.ai.chat(query, {
                model: 'gpt-4o', 
                tools: [{ type: 'web_search' }] 
            });

            let finalContent = searchResponse.message.content;
            let source = "Web Search";

            // 2. BRICK WALL CHECK (If answer is vague or too short)
            if (finalContent.length < 100 || finalContent.includes("I'm sorry") || finalContent.includes("couldn't find")) {
                status.innerText = "🧱 Brick Wall! Deploying Claude + Puter Internal Duo...";
                
                // Parallel fallback
                const [claudeResult, puterInternal] = await Promise.all([
                    fetchClaude(query),
                    puter.ai.chat(`Knowledge check: ${query}`)
                ]);

                finalContent = `**CLAUDE:** ${claudeResult}\n\n**PUTER:** ${puterInternal.message.content}`;
                source = "Dual Brain (Brick Wall)";
            }

            // 3. UPDATE UI
            chatBox.innerHTML += `<div class="bot-msg"><b>Glub:</b> ${finalContent}</div>`;
            status.innerText = `✅ Response via ${source}`;
            chatBox.scrollTop = chatBox.scrollHeight;

            // 4. CLOUD STORAGE (Supabase)
            await supabase.from('glub_memory').insert([
                { user_query: query, glub_response: finalContent, path_taken: source }
            ]);

        } catch (err) {
            status.innerText = "❌ Error in the cloud.";
            console.error(err);
        }
    }

    async function fetchClaude(prompt) {
        // Note: In production, wrap this in a Puter Worker to hide your key!
        const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'x-api-key': CONFIG.CLAUDE_KEY,
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json',
                'dangerouslyAllowBrowser': 'true' // Only for testing
            },
            body: JSON.stringify({
                model: "claude-3-5-sonnet-20240620",
                max_tokens: 1024,
                messages: [{ role: "user", content: prompt }]
            })
        });
        const data = await response.json();
        return data.content[0].text;
    }
</script>

</body>
</html>
