<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Glub AI | My Personal Cloud</title>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Sleek Bubbly Design */
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; }
        #glub-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; width: 100%; max-width: 500px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { color: #38bdf8; text-align: center; }
        #output { height: 300px; overflow-y: auto; border-bottom: 1px solid #334155; margin-bottom: 15px; padding: 10px; font-size: 0.9rem; }
        input { width: 75%; padding: 10px; border-radius: 8px; border: none; }
        button { width: 20%; padding: 10px; border-radius: 8px; background: #38bdf8; border: none; cursor: pointer; font-weight: bold; }
        .status { font-size: 0.7rem; color: #64748b; margin-top: 5px; }
    </style>
</head>
<body>

<div id="glub-card">
    <h1>GLUB 🫧</h1>
    <div id="output">Glub: Ready for orders.</div>
    <div style="display:flex; justify-content: space-between;">
        <input type="text" id="userInput" placeholder="Ask your cloud...">
        <button onclick="askGlub()">Go</button>
    </div>
    <div id="status" class="status">Status: Connected to Cloud</div>
</div>

<script>
    // FILL THESE IN ONCE
    const SB_URL = 'https://idkrlwabewpmmghuyupe.supabase.co';
    const SB_KEY = 'sb_publishable_9tE2OplfnU78zpQUSMRVNw_K7uOJFYw';
    
    const supabase = supabase.createClient(SB_URL, SB_KEY);

    async function askGlub() {
        const input = document.getElementById('userInput');
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        const query = input.value;
        if(!query) return;

        output.innerHTML += `<br><b>You:</b> ${query}`;
        input.value = "";
        status.innerText = "🔍 Searching Web...";

        try {
            // STEP 1: Puter attempts search with GPT-4o
            let res = await puter.ai.chat(query, { model: 'gpt-4o', tools: [{ type: 'web_search' }] });
            let content = res.message.content;

            // STEP 2: The "Brick Wall" Logic
            // If the search response is short or empty, we hit the wall
            if (content.length < 150 || content.includes("I couldn't find")) {
                status.innerText = "🧱 Brick Wall! Getting Claude's opinion...";
                
                // We use Puter to call Claude directly (Uses YOUR Puter account)
                let claudeRes = await puter.ai.chat(`Please answer this complex query: ${query}`, { model: 'claude-3-5-sonnet' });
                content = `<b>[CLAUDE FALLBACK]:</b> ${claudeRes.message.content}`;
            }

            // STEP 3: Display and Save
            output.innerHTML += `<br><b>Glub:</b> ${content}<hr>`;
            status.innerText = "✅ Saved to Supabase";
            
            await supabase.from('glub_memory').insert([{ user_query: query, glub_response: content }]);
            
        } catch (err) {
            status.innerText = "❌ Error: " + err.message;
        }
    }
</script>
</body>
</html>
